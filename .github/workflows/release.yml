name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write # needed to create the GitHub release

env:
  IMAGE: amslertec/containly

jobs:
  docker:
    name: Build & Push (Docker Hub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          # amd64 only for now: Vite 8/Rolldown's arm64 native binding isn't
          # reliably installed under emulation (npm optional-deps bug #4828).
          platforms: linux/amd64
          build-args: |
            CONTAINLY_VERSION=${{ steps.meta.outputs.version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Extract changelog section for this version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            /^## \[/ {f=0}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          # Fallback if the section is empty.
          [ -s RELEASE_NOTES.md ] || echo "See CHANGELOG.md for details." > RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # Curated changelog first; GitHub appends the auto "What's Changed" list.
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          draft: false
          prerelease: false
